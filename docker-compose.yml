services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: roleplay
      POSTGRES_USER: roleplay
      POSTGRES_PASSWORD: roleplay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://roleplay:roleplay@postgres:5432/roleplay
      SECRET_KEY: change-this-local-secret
      OWNER_EMAIL: owner@rp.local
      OWNER_PASSWORD: owner1234
      COOKIE_SECURE: "0"
    ports:
      - "8080:8080"

volumes:
  pgdata:
