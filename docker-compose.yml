services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: faircroft
      POSTGRES_USER: faircroft
      POSTGRES_PASSWORD: faircroft
    volumes:
      - faircroft_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faircroft -d faircroft"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://faircroft:faircroft@postgres:5432/faircroft?schema=public
      PORT: "3000"
      NODE_ENV: production
      RAILWAY_ENVIRONMENT: local-docker
      JWT_SECRET: local-docker-jwt-secret-change-before-sharing
      SECRET_KEY: local-docker-secret-key-change-before-sharing
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      SEED_ON_START: "true"
    ports:
      - "3000:3000"

volumes:
  faircroft_postgres:
